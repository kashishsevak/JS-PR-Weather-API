<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/style.css" type="text/css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center" style="margin-top: 70px;">

            <div class="col-md-4">

                <div class="card weather-card text-white p-4 mt-5 shadow">

                    <h3 class="text-center text-white mb-3">Weather Search</h3>

                    <div class="input-group mb-3">
                        <input type="text" id="searchCity" class="form-control" placeholder="Enter City">
                        <button class="btn btn-primary" id="searchBtn">Search</button>
                    </div>

                    <img id="icon" class="mx-auto weather-img">

                    <h4 id="cityOutput" class="text-center text-white"></h4>

                    <h2 id="temperature" class="text-center text-white"></h2>

                    <p id="weatherText" class="text-center text-white"></p>

                    <div class="d-flex justify-content-between mt-3">
                        <strong><i class="bi bi-wind"></i> Wind: <span id="wind"></span></strong>
                        <strong><i class="bi bi-moisture"></i> Humdidty: <span id="humid"></span></strong>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</body>

</html>
